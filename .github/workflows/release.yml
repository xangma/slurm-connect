name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump to publish.
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: read

concurrency:
  group: vscode-marketplace-release
  cancel-in-progress: false

jobs:
  validate:
    name: Validate release candidate
    if: >-
      ${{
        github.ref == 'refs/heads/main' &&
        (
          github.event_name == 'workflow_dispatch' ||
          (
            github.actor != 'github-actions[bot]' &&
            !startsWith(github.event.head_commit.message, 'chore(release):')
          )
        )
      }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Python tests with coverage
        run: npm run test:python

      - name: VS Code smoke test
        run: xvfb-run -a npm run test:integration

      - name: Package VSIX
        run: npm run package:vsix -- --out slurm-connect-release-check.vsix

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: slurm-connect-release-check
          path: slurm-connect-release-check.vsix
          if-no-files-found: error

  publish:
    name: Publish to VS Code Marketplace
    needs: validate
    runs-on: ubuntu-latest
    environment: vscode-marketplace
    permissions:
      contents: write
    env:
      RELEASE_BUMP: ${{ github.event_name == 'workflow_dispatch' && inputs.version_bump || 'patch' }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Verify Marketplace token
        run: |
          set -euo pipefail
          if [ -z "${VSCE_PAT}" ]; then
            echo "::error::Missing VSCE_PAT secret in the vscode-marketplace environment or repository."
            exit 1
          fi

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Verify Git push permission
        run: git push --dry-run origin "HEAD:${GITHUB_REF_NAME}"

      - name: Publish extension
        id: publish
        run: |
          set -euo pipefail
          npm run publish:marketplace -- "$RELEASE_BUMP" -m "chore(release): v%s [skip ci]"
          VERSION="$(node -p "require('./package.json').version")"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Push release commit and tag
        run: |
          set -euo pipefail
          VERSION="${{ steps.publish.outputs.version }}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git push origin "v${VERSION}"

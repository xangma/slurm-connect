name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Python tests with coverage
        run: npm run test:python

      - name: VS Code smoke test
        run: xvfb-run -a npm run test:integration

  slurm-e2e:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Real SSH + Slurm smoke test
        run: npm run e2e:slurm:smoke

      - name: Extension fixture integration test
        run: xvfb-run -a npm run test:integration:slurm

      - name: Full Remote-SSH session test
        run: xvfb-run -a npm run e2e:slurm:remote-session

      - name: Tear down Slurm fixture
        if: always()
        run: npm run e2e:slurm:clean

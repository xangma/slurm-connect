name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests with coverage
        run: npm run test:coverage

      - name: Python tests with coverage
        run: npm run test:python

      - name: VS Code smoke test
        run: xvfb-run -a npm run test:integration

  slurm-e2e:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Real SSH + Slurm smoke test
        run: npm run e2e:slurm:smoke

      - name: Extension fixture integration test
        run: xvfb-run -a npm run test:integration:slurm

      - name: Full Remote-SSH session test
        run: xvfb-run -a npm run e2e:slurm:remote-session

      - name: Tear down Slurm fixture
        if: always()
        run: npm run e2e:slurm:clean

  local-proxy-unit-os:
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Local proxy unit tests
        run: npm run test:unit -- src/test/unit/localProxy.test.ts src/test/unit/localProxyRuntime.test.ts

  slurm-client-e2e:
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    env:
      SLURM_CLIENT_SSH_HOST: ${{ secrets.SLURM_CLIENT_SSH_HOST }}
      SLURM_CLIENT_SSH_PORT: ${{ secrets.SLURM_CLIENT_SSH_PORT }}
      SLURM_CLIENT_SSH_USER: ${{ secrets.SLURM_CLIENT_SSH_USER }}
      SLURM_CLIENT_SSH_PRIVATE_KEY: ${{ secrets.SLURM_CLIENT_SSH_PRIVATE_KEY }}
      SLURM_CLIENT_SSH_PRIVATE_KEY_B64: ${{ secrets.SLURM_CLIENT_SSH_PRIVATE_KEY_B64 }}
      SLURM_CLIENT_KNOWN_HOSTS: ${{ secrets.SLURM_CLIENT_KNOWN_HOSTS }}
      SLURM_CLIENT_KNOWN_HOSTS_B64: ${{ secrets.SLURM_CLIENT_KNOWN_HOSTS_B64 }}
      SLURM_CLIENT_HOME: ${{ vars.SLURM_CLIENT_HOME }}
      SLURM_CLIENT_DEFAULT_PARTITION: ${{ vars.SLURM_CLIENT_DEFAULT_PARTITION }}
      SLURM_CLIENT_EXPECTED_SINFO_PATTERN: ${{ vars.SLURM_CLIENT_EXPECTED_SINFO_PATTERN }}
      SLURM_CLIENT_EXPECTED_COMPUTE_HOST_PATTERN: ${{ vars.SLURM_CLIENT_EXPECTED_COMPUTE_HOST_PATTERN }}
      SLURM_CLIENT_EXTRA_SALLOC_ARGS_JSON: ${{ vars.SLURM_CLIENT_EXTRA_SALLOC_ARGS_JSON }}
      SLURM_CLIENT_REMOTE_WORKSPACE_PATH: ${{ vars.SLURM_CLIENT_REMOTE_WORKSPACE_PATH }}
      SLURM_CLIENT_STARTUP_COMMAND: ${{ vars.SLURM_CLIENT_STARTUP_COMMAND }}
      SLURM_CLIENT_MODULE_LOAD: ${{ vars.SLURM_CLIENT_MODULE_LOAD }}
      SLURM_CLIENT_PROXY_COMMAND: ${{ vars.SLURM_CLIENT_PROXY_COMMAND }}
      SLURM_CLIENT_LOCAL_PROXY_REMOTE_HOST: ${{ vars.SLURM_CLIENT_LOCAL_PROXY_REMOTE_HOST }}
      SLURM_CLIENT_LOCAL_PROXY_TARGET_HOST: ${{ vars.SLURM_CLIENT_LOCAL_PROXY_TARGET_HOST }}
      SLURM_CLIENT_LOCAL_PROXY_COMPUTE_TUNNEL: ${{ vars.SLURM_CLIENT_LOCAL_PROXY_COMPUTE_TUNNEL }}
      SLURM_CLIENT_ALLOW_SKIP: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork && '1' || '' }}
      SLURM_CLIENT_E2E_REQUIRED: ${{ vars.SLURM_CLIENT_E2E_REQUIRED || '1' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Extension client integration test
        run: npm run test:integration:slurm-client

      - name: Full Remote-SSH allocation session test
        run: npm run test:integration:slurm-client-remote-session

      - name: Full Remote-SSH local proxy routing test
        run: npm run test:integration:slurm-client-local-proxy
